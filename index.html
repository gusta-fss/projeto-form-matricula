<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrelas do Amanhã</title>

    <link rel="stylesheet" href="styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <main>
            <div class="main-container">
                <header>
                    <div class="back">
                        <img src="assets/icons/arrow-left-02.svg" alt="seta para voltar">
                        <span>Voltar</span>
                    </div>

                    <h1>Formulário de Matrícula</h1>
                    <p>Preencha os dados abaixo para matricular seu filho na escola de educação infantil Estrelas do
                        Amanhã.</p>
                </header>
            </div>
        </main>

        <aside>
            <div class="aside-container">
                <header>
                    <img id="logo" src="assets/Logo.svg" alt="logo Estrelas do Amanhã">
                    <h2>Porque cada momento de <span>aprendizado</span> conta</h2>
                    <p>Inscreva seu filho em nossa escola e veja-o florescer em um ambiente acolhedor, seguro e estimulante.</p>
                </header>

                <img src="assets/Illustration.svg" alt="Ilustração de crianças brincando e aprendendo">
            </div>
        </aside>
    </div>
</body>

</html>
